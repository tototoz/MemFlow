policy_type: MemFlowPolicy

# Diffusion parameters
num_diffusion_iters: 100
beta_start: 0.0001
beta_end: 0.02
horizon: 8
n_obs_steps: 2

# Observation encoding
image_embed_size: 64
text_embed_size: 64
obs_hidden_size: 256

# UNet architecture
diffusion_step_embed_dim: 256
down_dims: [128, 256, 512]
kernel_size: 3
n_groups: 8
cond_predict_scale: false

# ============================================================
# Denoising Convergence Monitor (DCM)
# ============================================================
# End-to-end joint training: loss = DDPM_loss + lambda_dcm * DCM_loss
# DCM labels are generated online from the current UNet's DDIM trajectory.
dcm:
  enabled: false
  K_max: 100             # Max DDIM steps at inference
  K_train: 20           # DDIM steps for online label generation during training
  min_steps: 5          # Minimum steps before early-stop is allowed
  threshold: 0.7        # Convergence score threshold for stopping
  epsilon: 0.001        # Convergence tolerance (for soft label generation)
  lambda_dcm: 0.1       # DCM loss weight
  use_cond: true        # Use observation condition in monitor
  hidden_dims: [64, 32] # Monitor MLP hidden layers

defaults:
    - data_augmentation@color_aug: batch_wise_img_color_jitter_group_aug.yaml
    - data_augmentation@translation_aug: translation_aug.yaml
    - image_encoder: resnet_encoder.yaml
    - language_encoder: mlp_encoder.yaml

policy_type: MemFlowPolicy

# Flow Matching parameters
num_integration_steps: 10  # Default Euler steps (overridden by Router when enabled)
horizon: 8  # Predicted action steps (must be power of 2 for UNet downsampling)
# n_obs_steps defines both the LSTM observation window and the DINOv2 episodic window.
# Requires data.seq_len >= n_obs_steps + horizon - 1 = 39 → use data=memflow.
n_obs_steps: 32

# Observation encoding
image_embed_size: 64
text_embed_size: 64
obs_hidden_size: 256

# UNet architecture for vector field prediction
time_embed_dim: 256
down_dims: [128, 256, 512]
kernel_size: 3
n_groups: 8
cond_predict_scale: false

# ============================================================
# Memory Module Toggles
# ============================================================
use_working_memory: true    # L1: Action Memory (GRU) for motion coherence
use_episodic_memory: true   # L2: DINOv2 cross-attention for task progress

# Memory dimensions
memory_dim: 256  # Output dimension for both memory modules

# -----------------------------------------------------------
# L1 Action Memory (GRU)
# -----------------------------------------------------------
working_memory_len: 16              # Number of recent actions to remember
action_memory_hidden_dim: 128       # GRU input projection dimension
action_memory_gru_dim: 256          # GRU hidden size

# -----------------------------------------------------------
# L2 Episodic Memory (Full-frame DINOv2 Cross-Attention)
# -----------------------------------------------------------
dinov2_model: dinov2-small
dinov2_local_path: /home/ydj/article/LIBERO/dinov2_models/dinov2-small
episodic_memory_hidden_dim: 256     # Cross-attention hidden dimension
episodic_memory_n_heads: 4          # Cross-attention heads
episodic_memory_window: 32          # DINOv2 feature window size (= n_obs_steps)

# -----------------------------------------------------------
# Adaptive Step Router (C2)
# -----------------------------------------------------------
use_adaptive_router: false          # Enable in Phase 2 training
router_hidden_dims: [256, 128]
router_step_options: [2, 4, 8, 16]
router_lambda_speed: 0.1
router_gumbel_tau: 1.0

defaults:
    - data_augmentation@color_aug: batch_wise_img_color_jitter_group_aug.yaml
    - data_augmentation@translation_aug: translation_aug.yaml
    - image_encoder: resnet_encoder.yaml
    - language_encoder: mlp_encoder.yaml

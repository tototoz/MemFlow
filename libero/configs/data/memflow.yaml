# MemFlow-specific data config.
# seq_len must satisfy: seq_len >= n_obs_steps + horizon - 1
# With n_obs_steps=17 and horizon=8: seq_len >= 24
#
# Usage: python libero/lifelong/main.py data=memflow policy=memflow_policy ...

defaults:
  - default   # inherit all fields from data/default.yaml

seq_len: 24
